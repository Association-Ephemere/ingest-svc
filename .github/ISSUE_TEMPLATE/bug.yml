name: Bug report
description: Report unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form to help us reproduce the bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the problem you encountered.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Service starts with config X
        2. A .jpg file is added to the watch folder
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Linux
        - Windows
        - macOS
        - Other
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      placeholder: "e.g. 8.0.3"
